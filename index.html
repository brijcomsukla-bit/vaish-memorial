<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>In Loving Memory</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/6c5d537b67.js" crossorigin="anonymous"></script>

</head>

<body>

<div id="loading">

<div class="loader"></div>

<h2>Loading...</h2>

</div>

<div id="lockScreen">

<div class="lockBox">

<h1>🕉️</h1>

<h2>श्रद्धेय</h2>

<h1>स्व० सीताराम यादव</h1>

<p>Forever In Our Hearts</p>

<input
type="password"
id="password"
placeholder="Enter Secret Code">

<button onclick="unlock()">

Unlock

</button>

<p id="error"></p>

</div>

</div>

<div id="mainContent">

<div id="particles"></div>

<section class="hero">

<div class="overlay"></div>

<div class="heroContent">

<img src="assets/images/main.jpg" class="mainImage">

<h1>Vaish</h1>

<h2>Forever Remembered</h2>

<p>

"Those we love never truly leave us."

</p>

<button id="musicBtn">

<i class="fas fa-music"></i>

Play Music

</button>

</div>

</section>

<section class="gallery">

<h2>Memories</h2>

<div class="galleryGrid">

<img src="assets/images/photo1.jpg">

<img src="assets/images/photo2.jpg">

<img src="assets/images/photo3.jpg">

<img src="assets/images/photo4.jpg">

</div>

</section>

<section class="tribute">

<h2>A Beautiful Soul</h2>

<p>

Your memories will forever remain in our hearts.

Every smile, every blessing,

every moment will always be cherished.

</p>

</section>

<footer>

❤️ Forever Loved ❤️

</footer>

<audio
id="bgMusic"
loop>

<source
src="assets/music/music.mp3"
type="audio/mpeg">

</audio>

</div>

<script src="script.js"></script>

</body>

</html>
